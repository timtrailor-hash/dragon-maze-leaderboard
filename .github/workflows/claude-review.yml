name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          direct_prompt: |
            You are reviewing this change against Tim's standard quality bar.

            Apply these checks:
            1. Security: hardcoded credentials, command injection, unsafe subprocess, leaked tokens
            2. Correctness: null/None handling, error paths, race conditions
            3. Printer safety (only if this repo touches Klipper/Moonraker/G-code):
               - state check before every command
               - allowlist enforcement
               - kill switch documented
            4. Drift: hardcoded /Users/timtrailor/Documents paths that won't work on Mac Mini

            Be terse. Only flag real issues. Format:
            - [SEVERITY] file:line — issue (one-line fix)

            If no issues, reply "LGTM".
